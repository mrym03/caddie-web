# Netlify config for the Caddie marketing site (static HTML/CSS/JS — no build step)
[build]
  publish = "."

# three.min.js is a pinned vendor lib that never changes — cache it hard.
# (gradient.js is left on Netlify's default ETag revalidation since it's still
# being edited; immutable caching there would serve stale code.)
[[headers]]
  for = "/js/three.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
